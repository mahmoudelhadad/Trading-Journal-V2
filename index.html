// pip/point table: f=price multiplier, pv=$ per unit, t=market type
var PT={
  "US100":{f:1,pv:1,t:"forex"},"US500":{f:1,pv:5,t:"forex"},"US30":{f:1,pv:5,t:"forex"},

};

var C={bg:"#0D1421",card:"#111D2E",row:"#1A2535",rowAlt:"#152030",border:"#243350",
  text:"#C8D6E8",dim:"#6B82A0",white:"#FFFFFF",
  blue:"#3B82F6",green:"#22C55E",red:"#EF4444",gold:"#F59E0B",
  purple:"#8B5CF6",teal:"#14B8A6",orange:"#F97316",pink:"#EC4899"};

var DEFAULT_ACCOUNTS=[{id:"acc_1",name:"Main Account",capital:10000,color:"#3B82F6"}];

// ─── CALCULATIONS ─────────────────────────────────────────────
function getP(sym){return PT[sym]||{f:1,pv:1,t:"forex"};}
function isFut(sym){return getP(sym).t==="futures";}
function pointLabel(sym){return isFut(sym)?"Points":"Pips";}

function calcR(t){
  if(!t.entryPrice||!t.stopLoss||!t.exitPrice)return null;
  var ep=+t.entryPrice,sl=+t.stopLoss,ex=+t.exitPrice,d=Math.abs(ep-sl);
  if(!d)return null;
  return t.direction==="Long"?(ex-ep)/d:(ep-ex)/d;
}
function calcPlannedR(t){
  if(!t.entryPrice||!t.stopLoss||!t.target)return null;
  var ep=+t.entryPrice,sl=+t.stopLoss,tg=+t.target,d=Math.abs(ep-sl);
  if(!d)return null;
  return t.direction==="Long"?(tg-ep)/d:(ep-tg)/d;
}
function calcPL(t){
  if(!t.entryPrice||!t.exitPrice||!t.positionSize||!t.symbol)return null;
  var p=getP(t.symbol);
  var diff=t.direction==="Long"?+t.exitPrice-+t.entryPrice:+t.entryPrice-+t.exitPrice;
  return +t.positionSize*diff*p.f*p.pv;
}
function calcRisk(t){
  if(!t.entryPrice||!t.stopLoss||!t.positionSize||!t.symbol)return null;
  var p=getP(t.symbol);
  return +t.positionSize*Math.abs(+t.entryPrice-+t.stopLoss)*p.f*p.pv;
}
function calcPoints(t){
  if(!t.entryPrice||!t.exitPrice||!t.symbol)return null;
  var p=getP(t.symbol);
  var diff=t.direction==="Long"?+t.exitPrice-+t.entryPrice:+t.entryPrice-+t.exitPrice;
  return Math.round(diff*p.f*100)/100;
}
function parseDurMins(t){
  if(!t.entryTime||!t.exitTime||!t.date)return null;
  try{var d=Math.abs(new Date(t.date+"T"+t.exitTime)-new Date(t.date+"T"+t.entryTime));
    return Math.floor(d/60000);}
  catch(e){return null;}
}
function formatDur(mins){
  if(mins===null)return"—";
  var h=Math.floor(mins/60),m=mins%60;
  return h+"h "+m+"m";
}
function outcome(r){if(r===null)return"";return r>0.2?"Green":r<-0.2?"Red":"Breakeven";}
function oc(o){return({Green:C.green,Red:C.red,Breakeven:C.gold})[o]||C.dim;}

function enrich(trades,accounts){
  var accRun={};
  accounts.forEach(function(a){accRun[a.id]=a.capital;});
  return trades.map(function(t,i){
    var accId=t.accountId||accounts[0].id;
    if(!accRun[accId]){var a=accounts.find(function(x){return x.id===accId;});accRun[accId]=a?a.capital:10000;}
    var r=calcR(t),pl=calcPL(t),rv=calcRisk(t),comm=t.commission?+t.commission:0;
    var netPL=pl!==null?pl-comm:null;
    var capital=accRun[accId];
    if(netPL!==null)accRun[accId]+=netPL;
    var durMins=parseDurMins(t);
    var o={};Object.keys(t).forEach(function(k){o[k]=t[k];});
    o._i=i+1;o._r=r;o._pts=calcPoints(t);o._pl=pl;o._netPL=netPL;o._rv=rv;
    o._rPct=(rv&&capital)?rv/capital:null;o._plannedR=calcPlannedR(t);
    o._outcome=outcome(r);o._capital=capital;
    o._durMins=durMins;o._dur=formatDur(durMins);
    o._isFutures=isFut(t.symbol||"");o._ptLabel=pointLabel(t.symbol||"");
    return o;
  });
}

var fr={
  r:function(v){return v===null?"—":(v>=0?"+":"")+v.toFixed(2)+"R";},
  pct:function(v){return v===null?"—":(v*100).toFixed(1)+"%";},
  usd:function(v){return v===null?"—":(v>=0?"+$":"-$")+Math.abs(v).toFixed(2);},
  pt:function(v){return v===null?"—":(v>=0?"+":"")+v.toFixed(2);},
};

// ─── STORAGE ─────────────────────────────────────────────────
var LS={
  get:function(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},
};

var TT={contentStyle:{background:"#1A2535",border:"1px solid #243350",color:"#C8D6E8",fontSize:10,borderRadius:6},

function Modal(p){

function Card(p){

function Divider(){return h("div",{style:{height:1,background:C.border,margin:"14px 0"}});}


// ─── SETTINGS MANAGER ─────────────────────────────────────────
function SettingsManager(props){
  var lists=props.lists;
  var sk=useState(Object.keys(lists)[0]); var selKey=sk[0],setSelKey=sk[1];
  var ni=useState(""); var newItem=ni[0],setNewItem=ni[1];
  var curList=lists[selKey]||[];
  function addItem(){if(!newItem.trim())return;props.onChange(selKey,curList.concat([newItem.trim()]));setNewItem("");}
  function removeItem(idx){props.onChange(selKey,curList.filter(function(_,i){return i!==idx;}));}
  function moveUp(idx){if(idx===0)return;var a=curList.slice();var t=a[idx-1];a[idx-1]=a[idx];a[idx]=t;props.onChange(selKey,a);}
  function moveDown(idx){if(idx===curList.length-1)return;var a=curList.slice();var t=a[idx+1];a[idx+1]=a[idx];a[idx]=t;props.onChange(selKey,a);}
  function editItem(idx,val){var a=curList.slice();a[idx]=val;props.onChange(selKey,a);}
  var listKeys=Object.keys(lists);
  return h(Modal,{onClose:props.onClose},
    h("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:12,width:"100%",maxWidth:580,marginTop:16}},
      h("div",{style:{padding:"13px 18px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("span",{style:{color:C.white,fontWeight:700,fontSize:14}},"⚙ Settings — Edit Lists"),
        h("button",{onClick:props.onClose,style:{background:"none",border:"none",color:C.dim,fontSize:22,cursor:"pointer",lineHeight:1}},"×")
      ),
      h("div",{style:{padding:16}},
        h(FF,{label:"Select list to edit"},
          h("select",{value:selKey,onChange:function(ev){setSelKey(ev.target.value);},style:{width:"100%"}},
            listKeys.map(function(k){return h("option",{key:k,value:k},k);})
          )
        ),
        h("div",{style:{background:C.bg,borderRadius:8,border:"1px solid "+C.border,maxHeight:280,overflowY:"auto",marginBottom:12}},
          curList.map(function(item,idx){
            return h("div",{key:idx,style:{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderBottom:"1px solid "+C.border}},
              h("input",{value:item,onChange:function(ev){editItem(idx,ev.target.value);},
                style:{flex:1,background:"none",border:"none",color:C.text,fontSize:11,outline:"none"}}),
              h("button",{onClick:function(){moveUp(idx);},style:{background:"none",border:"none",color:C.dim,fontSize:12,cursor:"pointer",padding:"0 3px"}},"▲"),
              h("button",{onClick:function(){moveDown(idx);},style:{background:"none",border:"none",color:C.dim,fontSize:12,cursor:"pointer",padding:"0 3px"}},"▼"),
              h("button",{onClick:function(){removeItem(idx);},style:{background:"none",border:"none",color:C.red,fontSize:13,cursor:"pointer",padding:"0 4px"}},"×")
            );
          })
        ),
        h("div",{style:{display:"flex",gap:8}},
          h(Inp,{value:newItem,onChange:setNewItem,ph:"Add new item...",w:"auto",style:{flex:1}}),
          h("button",{onClick:addItem,style:{background:C.teal,color:"#fff",border:"none",borderRadius:7,padding:"5px 14px",fontSize:11,fontWeight:700}},"+Add")
        ),
        h("div",{style:{display:"flex",gap:8,marginTop:14,paddingTop:14,borderTop:"1px solid "+C.border}},
          h("button",{onClick:function(){props.onReset(selKey);},style:{background:"#2A1A1A",color:C.red,border:"1px solid "+C.red+"44",borderRadius:7,padding:"6px 14px",fontSize:11}},
            "Reset to Default"),
          h("button",{onClick:props.onClose,style:{background:C.blue,color:"#fff",border:"none",borderRadius:7,padding:"6px 18px",fontSize:11,fontWeight:700,marginLeft:"auto"}},
            "Done ✓")
        )
      )
    )
  );
}

// ─── ACCOUNT MANAGER ─────────────────────────────────────────
function AccManager(props){
  var st=useState({name:"",capital:"10000",color:"#3B82F6"}); var form=st[0],setForm=st[1];
  var et=useState(null); var editing=et[0],setEditing=et[1];
  var sf=function(k){return function(v){setForm(function(p){var n={};Object.keys(p).forEach(function(pk){n[pk]=p[pk];});n[k]=v;return n;});};};
  var colors=["#3B82F6","#22C55E","#F59E0B","#EF4444","#8B5CF6","#14B8A6","#F97316","#EC4899","#6366F1","#84CC16"];

  function addAcc(){
    if(!form.name.trim()||!form.capital)return;
    props.onAdd({id:"acc_"+Date.now(),name:form.name.trim(),capital:parseFloat(form.capital)||10000,color:form.color});
    setForm({name:"",capital:"10000",color:"#3B82F6"});
  }
  function startEdit(a){setEditing({id:a.id,name:a.name,capital:String(a.capital),color:a.color});}
  function saveEdit(){
    if(!editing)return;
    props.onEdit({id:editing.id,name:editing.name.trim()||"Account",capital:parseFloat(editing.capital)||10000,color:editing.color});
    setEditing(null);
  }
  function se(k){return function(v){setEditing(function(p){var n={};Object.keys(p).forEach(function(pk){n[pk]=p[pk];});n[k]=v;return n;});};}

  return h(Modal,{onClose:props.onClose},
    h("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:12,width:"100%",maxWidth:520,marginTop:16}},
      h("div",{style:{padding:"13px 18px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("span",{style:{color:C.white,fontWeight:700,fontSize:14}},"💼 Manage Accounts"),
        h("button",{onClick:props.onClose,style:{background:"none",border:"none",color:C.dim,fontSize:22,cursor:"pointer",lineHeight:1}},"×")
      ),
      h("div",{style:{padding:16}},
        // Existing accounts
        props.accounts.map(function(a){
          var isEd=editing&&editing.id===a.id;
          return h("div",{key:a.id,style:{background:C.row,borderRadius:8,border:"1px solid "+C.border,marginBottom:8,overflow:"hidden"}},
            isEd
              ?h("div",{style:{padding:10}},
                h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
                  h(FF,{label:"Account Name"},h(Inp,{value:editing.name,onChange:se("name"),ph:"Name"})),
                  h(FF,{label:"Capital ($)"},h(Inp,{value:editing.capital,onChange:se("capital"),type:"number",ph:"10000"}))
                ),
                h(FF,{label:"Color"},h("div",{style:{display:"flex",gap:5,flexWrap:"wrap"}},
                  colors.map(function(col){return h("div",{key:col,onClick:function(){se("color")(col);},
                    style:{width:20,height:20,borderRadius:"50%",background:col,cursor:"pointer",
                      border:editing.color===col?"3px solid #fff":"3px solid transparent"}});})
                )),
                h("div",{style:{display:"flex",gap:8,marginTop:8}},
                  h("button",{onClick:saveEdit,style:{background:C.green,color:"#fff",border:"none",borderRadius:6,padding:"5px 14px",fontSize:11,fontWeight:700}},"Save"),
                  h("button",{onClick:function(){setEditing(null);},style:{background:C.border,color:C.text,border:"none",borderRadius:6,padding:"5px 10px",fontSize:11}},"Cancel")

// ─── IMPORT / EXPORT ─────────────────────────────────────────
function ImportExport(props){
  var fs=useState(""); var feedback=fs[0],setFeedback=fs[1];
  var ms=useState(""); var mapping=ms[0],setMapping=ms[1];
  var cs=useState([]); var csvHeaders=cs[0],setCsvHeaders=cs[1];
  var pd=useState(null); var parsedData=pd[0],setParsedData=pd[1];
  var mp=useState({}); var colMap=mp[0],setColMap=mp[1];

  var tradeFields=["date","entryTime","exitTime","symbol","direction","positionSize",
    "entryPrice","stopLoss","target","exitPrice","commission","notes"];

  function handleFile(ev){
    var file=ev.target.files[0];if(!file)return;
    var name=file.name.toLowerCase();
    setFeedback("Reading file...");
    if(name.endsWith(".csv")){
      var reader=new FileReader();
      reader.onload=function(e){
        try{
          var lines=e.target.result.split(/\r?\n/).filter(function(l){return l.trim();});
          if(lines.length<2){setFeedback("File too short.");return;}
          var hdrs=lines[0].split(",").map(function(h){return h.replace(/"/g,"").trim();});
          setCsvHeaders(hdrs);
          var rows=lines.slice(1).map(function(l){
            var vals=l.split(",").map(function(v){return v.replace(/"/g,"").trim();});
            var obj={};hdrs.forEach(function(h,i){obj[h]=vals[i]||"";});
            return obj;
          });
          setParsedData(rows);
          setFeedback("✅ Loaded "+rows.length+" rows. Map columns below.");
        }catch(err){setFeedback("Error: "+err.message);}
      };
      reader.readAsText(file);
    } else if(name.endsWith(".xlsx")||name.endsWith(".xls")){
      if(typeof XLSX==="undefined"){setFeedback("Excel import not available. Please use CSV.");return;}
      var reader2=new FileReader();
      reader2.onload=function(e){
        try{
          var wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:"",raw:false});
          if(!raw||raw.length<2){setFeedback("File too short.");return;}
          // Find header row (first row with >3 filled cells)
          var hdrIdx=0;
          for(var ri=0;ri<Math.min(5,raw.length);ri++){
            if(raw[ri].filter(function(v){return v&&String(v).trim();}).length>3){hdrIdx=ri;break;}
          }
          var hdrs=raw[hdrIdx].map(function(h){return String(h||"").trim();});
          var dataRows=raw.slice(hdrIdx+1).filter(function(r){return r.some(function(v){return v!==null&&v!==""&&v!==undefined;});});
          if(!dataRows.length){setFeedback("No data rows found.");return;}
          var parsed=dataRows.map(function(row){
            var obj={};
            hdrs.forEach(function(h,i){
              var v=row[i]||"";
              // Handle date strings from SheetJS (format: M/D/YYYY or YYYY-MM-DD)
              if(h.toLowerCase().indexOf("date")>=0&&v&&String(v).match(/\d/)){
                try{
                  var d=new Date(v);
                  if(!isNaN(d)){
                    var yr=d.getFullYear(),mo=d.getMonth()+1,dy=d.getDate();
                    v=yr+"-"+(mo<10?"0"+mo:mo)+"-"+(dy<10?"0"+dy:dy);
                  }
                }catch(ex){}
              }
              // Handle time strings
              if((h.toLowerCase().indexOf("time")>=0)&&v&&String(v).match(/^\d+:\d+/)){
                var parts=String(v).split(":");
                var hh=parseInt(parts[0]),mm=parseInt(parts[1])||0;
                v=(hh<10?"0"+hh:hh)+":"+(mm<10?"0"+mm:mm);
              }
              obj[h]=String(v).trim();
            });
            return obj;
          });
          var cleanHdrs=hdrs.filter(function(h){return h;});
          setCsvHeaders(cleanHdrs);
          setParsedData(parsed);
          // Auto-map columns by name similarity
          var aliases={
            "symbol":["symbol","sym"],
            "date":["date","trade date"],
            "broker":["broker"],
            "account":["account"],
            "dailySetup":["daily setup"],
            "entrySetup":["intraday setup","entry setup"],
            "intraDaySetup":["mss msb ifvg","intra day"],
            "intraDayTF":["intraday tf","tf"],
            "session":["session"],
            "daySwing":["day/ swing","day swing","swing"],
            "positionSize":["position size","size","lots","contracts"],
            "direction":["long/ short","direction","long/short","side"],
            "entryTime":["entry time"],
            "exitTime":["exit time","exit  time"],
            "entryPrice":["entry price"],
            "exitPrice":["exit   price","exit price"],
            "stopLoss":["stop  loss","stop loss","sl"],
            "target":["target","tp"],
            "commission":["commission"],
            "personalRating":["personal rating","rating"],
            "emotions":["emotions"],
            "planFollowed":["plan followed"],
            "error":["error"],
            "notes":["notes"],
            "beSL":["be sl"," be sl"],
            "afSL":["af sl"],
            "sl1":["sl 1"],"sl2":["sl 2"],"sl3":["sl 3"],
            "tm1":["tm 1"],"tm2":["tm 2"],"tm3":["tm 3"],
            "tm4":["tm 4"],"tm5":["tm 5"],"tm6":["tm 6"],
          };
          var autoMap={};
          cleanHdrs.forEach(function(csvH){
            var low=csvH.toLowerCase().trim();
            Object.keys(aliases).forEach(function(field){
              if(autoMap[field])return;
              if(aliases[field].some(function(a){return low===a||low.indexOf(a)>=0;})){autoMap[field]=csvH;}
            });
          });
          setColMap(autoMap);
          setFeedback("✅ "+parsed.length+" rows loaded. Auto-mapped "+Object.keys(autoMap).length+" fields. Click Import.");
        }catch(err){setFeedback("Error: "+err.message);}
      };
      reader2.readAsArrayBuffer(file);
    } else {setFeedback("Unsupported format. Use CSV or XLSX.");}
  }

  function setMap(field,csvCol){var m={};Object.keys(colMap).forEach(function(k){m[k]=colMap[k];});m[field]=csvCol;setColMap(m);}

  function importData(){
    if(!parsedData)return;
    var accId=props.accounts[0]&&props.accounts[0].id||"acc_1";
    var imported=parsedData.map(function(row,i){
      var t=emptyT(accId);t._tid=Date.now()+i;
      tradeFields.forEach(function(f){if(colMap[f]&&row[colMap[f]]!==undefined)t[f]=String(row[colMap[f]]);});
      // Auto-detect market
      if(t.symbol&&FUT_SYMBOLS.indexOf(t.symbol)>=0)t.market="futures";
      else t.market="forex";
      return t;
    });
    props.onImport(imported);
    setFeedback("✅ Imported "+imported.length+" trades!");
    setParsedData(null);setCsvHeaders([]);setColMap({});
  }

  function exportCSV(accId){
    var trades=props.trades;
    if(accId&&accId!=="all")trades=trades.filter(function(t){return t.accountId===accId;});
    var headers=["#","Date","Symbol","Market","Direction","Size","Entry","SL","Target","Exit","R","P/L","Net P/L","Pips/Pts","Outcome","Setup Type","Session","Broker","Account","Duration","Notes"];
    var rows=trades.map(function(t){
      return [t._i,t.date,t.symbol,t.market,t.direction,t.positionSize,
        t.entryPrice,t.stopLoss,t.target,t.exitPrice,
        t._r!==null?t._r.toFixed(2):"",t._pl!==null?t._pl.toFixed(2):"",t._netPL!==null?t._netPL.toFixed(2):"",
        t._pts!==null?t._pts.toFixed(2):"",t._outcome,t.setupType,t.session,t.broker,t.account,t._dur,t.notes||""];
    });
    var csv=[headers.join(",")].concat(rows.map(function(r){return r.map(function(v){return'"'+(v||"")+'"';}).join(",");})).join("\n");
    var blob=new Blob([csv],{type:"text/csv"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;a.download="trades_export.csv";a.click();
    URL.revokeObjectURL(url);
  }

  var accOpts=[{id:"all",name:"All Accounts"}].concat(props.accounts);

  return h(Modal,{onClose:props.onClose},
    h("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:12,width:"100%",maxWidth:600,marginTop:16,marginBottom:20}},
      h("div",{style:{padding:"13px 18px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("span",{style:{color:C.white,fontWeight:700,fontSize:14}},"📂 Import / Export"),
        h("button",{onClick:props.onClose,style:{background:"none",border:"none",color:C.dim,fontSize:22,cursor:"pointer",lineHeight:1}},"×")
      ),
      h("div",{style:{padding:16}},
        h(SH,{c:C.blue,label:"Import Trades (CSV or Excel)"}),
        h("div",{style:{marginBottom:10}},
          h("input",{type:"file",accept:".csv,.xlsx,.xls",onChange:handleFile,
            style:{color:C.text,fontSize:11}}),
          feedback&&h("div",{style:{color:C.teal,fontSize:11,marginTop:6}},feedback)
        ),
        csvHeaders.length>0&&parsedData&&h("div",null,
          h("div",{style:{color:C.dim,fontSize:10,marginBottom:6}},"Map CSV columns to trade fields:"),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}},
            tradeFields.map(function(f){
              return h("div",{key:f,style:{display:"flex",alignItems:"center",gap:6}},
                h("div",{style:{color:C.text,fontSize:10,width:90,flexShrink:0}},f+":"),
                h("select",{value:colMap[f]||"",onChange:function(ev){setMap(f,ev.target.value);},
                  style:{flex:1,fontSize:10}},
                  h("option",{value:""},"— skip —"),
                  csvHeaders.map(function(h2){return h("option",{key:h2,value:h2},h2);})
                )
              );
            })
          ),
          h("button",{onClick:importData,style:{background:C.blue,color:"#fff",border:"none",borderRadius:8,
            padding:"7px 18px",fontSize:12,fontWeight:700,width:"100%"}},
            "✅ Import "+parsedData.length+" Trades")
        ),
        h(Divider),
        h(SH,{c:C.green,label:"Export Trades to CSV"}),
        h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
          accOpts.map(function(a){
            return h("button",{key:a.id,onClick:function(){exportCSV(a.id);},
              style:{background:C.row,border:"1px solid "+C.border,color:C.text,borderRadius:7,
                padding:"6px 12px",fontSize:11}},
              "⬇ Export "+a.name);
          })
        )
      )
    )
  );
}

    return(!fSym||t.symbol===fSym)&&(!fOut||t._outcome===fOut);
  });
  var selectedCount=Object.keys(selected).filter(function(k){return selected[k];}).length;
  var allFilteredSelected=filtered.length>0&&filtered.every(function(t){return selected[t._tid];});

  function toggleOne(tid){
    setSelected(function(p){var n=Object.assign({},p);n[tid]=!p[tid];return n;});
  }
  function toggleAll(){
    if(allFilteredSelected){
      // deselect all filtered
      setSelected(function(p){var n=Object.assign({},p);filtered.forEach(function(t){n[t._tid]=false;});return n;});
    } else {

      setSelected(function(p){var n=Object.assign({},p);filtered.forEach(function(t){n[t._tid]=true;});return n;});

    var ids=Object.keys(selected).filter(function(k){return selected[k];});

    ids.forEach(function(id){props.onDelete(id);});
    setSelected({});
  }
  function deleteAll(){
    if(!window.confirm("Delete ALL "+props.trades.length+" trades? This cannot be undone."))return;
    props.onDeleteAll();
    setSelected({});
  }

  var hdrs=["☐","#","Mkt","Symbol","Date","Day","Session","Account","Dir","Size","Entry","SL","Target","Exit","R","Pts","P/L","Net P/L","PlanR","Outcome","Setup","★","Plan","Risk$","Risk%","Dur","Chart","Edit"];

function aggG(ts){
  var n=ts.length;
  var green=ts.filter(function(t){return t._outcome==="Green";}).length;
  var red=ts.filter(function(t){return t._outcome==="Red";}).length;
  var be=ts.filter(function(t){return t._outcome==="Breakeven";}).length;
  var d=green+red,wr=d>0?green/d:null;
  var totalR=ts.reduce(function(s,t){return s+(t._r||0);},0);
  var pl=ts.reduce(function(s,t){return s+(t._pl||0);},0);
  var netPL=ts.reduce(function(s,t){return s+(t._netPL||0);},0);
  var avgR=n>0?totalR/n:null;
  return{n:n,green:green,red:red,be:be,wr:wr,totalR:totalR,avgR:avgR,pl:pl,netPL:netPL};
}
function AggTable(props){
  var rows=props.rows,run=0;

    h("table",{style:{borderCollapse:"collapse",width:"100%"}},

              h(Td,{s:{color:r.totalR>=0?C.green:C.red,fontWeight:700}},r.totalR.toFixed(2)),

function getWeekStart(d){var dt=new Date(d+"T12:00"),day=dt.getDay(),diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);return dt.toISOString().split("T")[0];}

// ─── STRATEGY TAB ─────────────────────────────────────────────
function byField(trades,field,list){
  return list.map(function(k){
    var ts=trades.filter(function(t){return t[field]===k;});
    if(!ts.length)return null;
    var obj=aggG(ts);obj.key=k;return obj;
  }).filter(Boolean);
}

function PerfTable(props){
  var cols=[
    {k:"key",l:"Name"},{k:"n",l:"Trades"},
    {k:"wr",l:"Win%",fn:function(v){return v!==null?(v*100).toFixed(0)+"%":"—";},c:function(v){return v>0.5?C.green:C.red;}},
    {k:"totalR",l:"Total R",fn:function(v){return v.toFixed(2);},c:function(v){return v>=0?C.green:C.red;}},
    {k:"avgR",l:"Avg R",fn:function(v){return v!==null?v.toFixed(2):"—";},c:function(v){return v>=0?C.green:C.red;}},
  ];
  var CS2={background:C.card,borderRadius:10,border:"1px solid "+C.border,padding:14,flex:1,minWidth:260};
  return h("div",{style:CS2},
    h("div",{style:{color:props.color,fontSize:11,fontWeight:700,marginBottom:10}},props.title),
    h("table",{style:{width:"100%",borderCollapse:"collapse"}},
      h("thead",null,h("tr",null,cols.map(function(c){return h(Th,{key:c.k},c.l);}))),
      h("tbody",null,
        props.rows.length===0
          ?h("tr",null,h("td",{colSpan:5,style:{textAlign:"center",padding:14,color:C.dim,fontSize:11}},"Not enough data"))
          :props.rows.map(function(r,i){
            return h("tr",{key:i,style:{background:i%2===0?C.row:C.rowAlt}},
              cols.map(function(c){return h(Td,{key:c.k,s:c.c?{color:c.c(r[c.k])}:{}},c.fn?c.fn(r[c.k]):r[c.k]);})
            );
          })
      )
    )
  );
}

function StrategyTab(props){
  var trades=props.trades, lists=props.lists;
  var CS={background:C.card,borderRadius:10,border:"1px solid "+C.border,padding:14,marginBottom:14};

  // Comparison filter state
  var f1s=useState("entrySetup"); var field1=f1s[0],setField1=f1s[1];
  var v1s=useState(""); var val1=v1s[0],setVal1=v1s[1];
  var f2s=useState("dailySetup"); var field2=f2s[0],setField2=f2s[1];
  var v2s=useState(""); var val2=v2s[0],setVal2=v2s[1];

  var filterableFields=[
    {key:"entrySetup",label:"Entry Setup",list:"EntrySetup"},
    {key:"dailySetup",label:"Daily Setup",list:"DailySetup"},
    {key:"session",label:"Session",list:"Session"},
    {key:"direction",label:"Direction",list:"Direction"},
    {key:"setupType",label:"Setup Type",list:"SetupType"},
    {key:"daySwing",label:"Day/Swing",list:"DaySwing"},
    {key:"intraDaySetup",label:"IntraDay Setup",list:"IntraDaySetup"},
    {key:"broker",label:"Broker",list:"Broker"},
    {key:"account",label:"Account Type",list:"Account"},
    {key:"liquidity",label:"Liquidity",list:"Liquidity"},
  ];

  var getFieldList=function(fk){
    var ff=filterableFields.find(function(f){return f.key===fk;});
    return ff?(lists[ff.list]||[]):[];
  };

  var f1Trades=useMemo(function(){return val1?trades.filter(function(t){return t[field1]===val1;}):[];},[trades,field1,val1]);
  var f2Trades=useMemo(function(){return val2?trades.filter(function(t){return t[field2]===val2;}):[];},[trades,field2,val2]);
  var combinedTrades=useMemo(function(){
    if(!val1&&!val2)return [];
    if(val1&&val2)return trades.filter(function(t){return t[field1]===val1&&t[field2]===val2;});
    if(val1)return f1Trades;
    return f2Trades;
  },[trades,field1,val1,field2,val2,f1Trades,f2Trades]);

  // Time stats
  var durMins=trades.map(function(t){return t._durMins;}).filter(function(v){return v!==null;});
  var totalMins=durMins.reduce(function(s,v){return s+v;},0);
  var avgMins=durMins.length>0?totalMins/durMins.length:null;
  var winMins=trades.filter(function(t){return t._outcome==="Green"&&t._durMins!==null;}).map(function(t){return t._durMins;});
  var avgWinMins=winMins.length>0?winMins.reduce(function(s,v){return s+v;},0)/winMins.length:null;
  var lossMins=trades.filter(function(t){return t._outcome==="Red"&&t._durMins!==null;}).map(function(t){return t._durMins;});
  var avgLossMins=lossMins.length>0?lossMins.reduce(function(s,v){return s+v;},0)/lossMins.length:null;

  // Avg entry time
  var entryTimes=trades.filter(function(t){return t.entryTime;}).map(function(t){
    var parts=t.entryTime.split(":");var h=+parts[0],m=+parts[1]||0;return h*60+m;
  });
  var avgEntryMins=entryTimes.length>0?entryTimes.reduce(function(s,v){return s+v;},0)/entryTimes.length:null;
  var avgEntryStr=avgEntryMins!==null?Math.floor(avgEntryMins/60)+":"+(Math.round(avgEntryMins%60)<10?"0":"")+Math.round(avgEntryMins%60):"—";

  // AVG Planned R, AVG Real R
  var pRVals=trades.map(function(t){return t._plannedR;}).filter(function(v){return v!==null;});
  var avgPlannedR=pRVals.length>0?pRVals.reduce(function(s,v){return s+v;},0)/pRVals.length:null;
  var rVals=trades.map(function(t){return t._r;}).filter(function(v){return v!==null;});
  var avgRealR=rVals.length>0?rVals.reduce(function(s,v){return s+v;},0)/rVals.length:null;

  // Before/after 9:30
  var before930=trades.filter(function(t){if(!t.entryTime)return false;var p=t.entryTime.split(":");return +p[0]*60+(+p[1]||0)<9*60+30;});
  var after930=trades.filter(function(t){if(!t.entryTime)return false;var p=t.entryTime.split(":");return +p[0]*60+(+p[1]||0)>=9*60+30;});
  var b9a=aggG(before930);var a9a=aggG(after930);
  var timeCompData=[
    {name:"Before 9:30",trades:b9a.n,wr:b9a.wr!==null?+(b9a.wr*100).toFixed(1):0,totalR:Math.round(b9a.totalR*100)/100,avgR:b9a.avgR!==null?Math.round(b9a.avgR*100)/100:0},
    {name:"After 9:30",trades:a9a.n,wr:a9a.wr!==null?+(a9a.wr*100).toFixed(1):0,totalR:Math.round(a9a.totalR*100)/100,avgR:a9a.avgR!==null?Math.round(a9a.avgR*100)/100:0},
  ];

  var byEntry=useMemo(function(){return byField(trades,"entrySetup",lists.EntrySetup||DEFAULT_LISTS.EntrySetup);},[trades]);
  var byDaily=useMemo(function(){return byField(trades,"dailySetup",lists.DailySetup||DEFAULT_LISTS.DailySetup);},[trades]);
  var byST=useMemo(function(){return byField(trades,"setupType",lists.SetupType||DEFAULT_LISTS.SetupType);},[trades]);
  var bySess=useMemo(function(){return byField(trades,"session",lists.Session||DEFAULT_LISTS.Session);},[trades]);
  var byDay=useMemo(function(){
    var DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday"];
    return DAYS.map(function(d){
      var ts=trades.filter(function(t){return t.date&&new Date(t.date+"T12:00").toLocaleDateString("en",{weekday:"long"})===d;});
      if(!ts.length)return null;var obj=aggG(ts);obj.key=d.slice(0,3);return obj;
    }).filter(Boolean);
  },[trades]);

  var slStudy=useMemo(function(){
    return [{l:"Actual R",f:"_r",direct:true},{l:"Be SL",f:"beSL"},{l:"Af SL",f:"afSL"},
      {l:"SL 1",f:"sl1"},{l:"SL 2",f:"sl2"},{l:"SL 3",f:"sl3"}].map(function(item){
      var vals=trades.map(function(t){return item.direct?t._r:(t[item.f]?+t[item.f]:null);}).filter(function(v){return v!==null;});
      if(!vals.length)return null;
      var avg=vals.reduce(function(s,v){return s+v;},0)/vals.length;
      return{l:item.l,n:vals.length,avg:+(avg.toFixed(2)),max:+(Math.max.apply(null,vals).toFixed(2)),min:+(Math.min.apply(null,vals).toFixed(2))};
    }).filter(Boolean);
  },[trades]);

  var tmStudy=useMemo(function(){
    return ["tm1","tm2","tm3","tm4","tm5","tm6"].map(function(f,i){
      var vals=trades.map(function(t){return t[f]?+t[f]:null;}).filter(function(v){return v!==null;});
      if(!vals.length)return null;
      var avg=vals.reduce(function(s,v){return s+v;},0)/vals.length;
      return{l:"TM "+(i+1),n:vals.length,avg:+(avg.toFixed(2)),max:+(Math.max.apply(null,vals).toFixed(2))};
    }).filter(Boolean);
  },[trades]);

  var noData=h("div",{style:{color:C.dim,fontSize:11,padding:16,textAlign:"center"}},"Not enough data");

  return h("div",null,
    // Time Stats
    h("div",{style:{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}},
      h(StatBox,{label:"Avg Planned R",value:avgPlannedR!==null?fr.r(avgPlannedR):"—",color:avgPlannedR>0?C.blue:C.dim}),
      h(StatBox,{label:"Avg Real R",value:avgRealR!==null?fr.r(avgRealR):"—",color:avgRealR>0?C.green:C.red}),
      h(StatBox,{label:"Total Trade Time",value:Math.floor(totalMins/60)+"h "+Math.round(totalMins%60)+"m",color:C.teal}),
      h(StatBox,{label:"Avg Trade Duration",value:avgMins!==null?Math.floor(avgMins/60)+"h "+Math.round(avgMins%60)+"m":"—",color:C.blue}),
      h(StatBox,{label:"Avg Winning Duration",value:avgWinMins!==null?Math.floor(avgWinMins/60)+"h "+Math.round(avgWinMins%60)+"m":"—",color:C.green}),
      h(StatBox,{label:"Avg Losing Duration",value:avgLossMins!==null?Math.floor(avgLossMins/60)+"h "+Math.round(avgLossMins%60)+"m":"—",color:C.red}),
      h(StatBox,{label:"Avg Entry Time",value:avgEntryStr,color:C.gold})
    ),
    // Perf tables row 1
    h("div",{style:{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}},
      h(PerfTable,{title:"By Entry Setup",color:C.green,rows:byEntry}),
      h(PerfTable,{title:"By Daily Setup",color:C.blue,rows:byDaily})
    ),
    h("div",{style:{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}},
      h(PerfTable,{title:"By Session",color:C.teal,rows:bySess}),
      h(PerfTable,{title:"By Setup Type",color:C.gold,rows:byST})
    ),
    // Before/After 9:30 + Day of week
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}},
      h("div",{style:CS},
        h("div",{style:{color:C.purple,fontSize:11,fontWeight:700,marginBottom:10}},"⏱ Before vs After 9:30 AM"),
        h(ResponsiveContainer,{width:"100%",height:160},
          h(BarChart,{data:timeCompData,barCategoryGap:"30%"},
            h(CartesianGrid,{strokeDasharray:"3 3",stroke:"#1E2D42",vertical:false}),
            h(XAxis,{dataKey:"name",stroke:C.dim,tick:{fontSize:9},axisLine:{stroke:C.border}}),
            h(YAxis,{stroke:C.dim,tick:{fontSize:9},axisLine:{stroke:C.border}}),
            h(Tooltip,Object.assign({},TT,{formatter:function(v,n){return[n==="avgR"?v.toFixed(2)+"R":n==="wr"?v+"%":v,n];}})),
            h(Bar,{dataKey:"trades",name:"Trades",fill:C.blue,radius:[4,4,0,0]}),
            h(Bar,{dataKey:"avgR",name:"Avg R",radius:[4,4,0,0]},
              timeCompData.map(function(d,i){return h(Cell,{key:i,fill:d.avgR>=0?C.green:C.red});})
            )
          )
        )
      ),
      h("div",{style:CS},
        h("div",{style:{color:C.teal,fontSize:11,fontWeight:700,marginBottom:10}},"📅 Avg R by Day of Week"),
        byDay.length===0?noData:h(ResponsiveContainer,{width:"100%",height:160},
          h(BarChart,{data:byDay.map(function(r){return{name:r.key,avgR:+(r.avgR||0).toFixed(2)};})},
            h(CartesianGrid,{strokeDasharray:"3 3",stroke:"#1E2D42",vertical:false}),
            h(XAxis,{dataKey:"name",stroke:C.dim,tick:{fontSize:10},axisLine:{stroke:C.border}}),
            h(YAxis,{stroke:C.dim,tick:{fontSize:9},axisLine:{stroke:C.border}}),
            h(Tooltip,TT),
            h(Bar,{dataKey:"avgR",radius:[4,4,0,0]},byDay.map(function(d,i){return h(Cell,{key:i,fill:d.avgR>=0?C.green:C.red});}))
          )
        )
      )
    ),
    // SL Study + TM Study
    h("div",{style:{display:"flex",gap:14,flexWrap:"wrap",marginBottom:14}},
      h("div",{style:{background:C.card,borderRadius:10,border:"1px solid "+C.border,padding:14,flex:1,minWidth:260}},
        h("div",{style:{color:C.gold,fontSize:11,fontWeight:700,marginBottom:10}},"SL Study — Avg R Comparison"),
        h("table",{style:{width:"100%",borderCollapse:"collapse"}},
          h("thead",null,h("tr",null,h(Th,null,"SL"),h(Th,null,"n"),h(Th,null,"Avg R"),h(Th,null,"Max"),h(Th,null,"Min"))),
          h("tbody",null,
            slStudy.length===0?h("tr",null,h("td",{colSpan:5,style:{textAlign:"center",padding:12,color:C.dim,fontSize:11}},"No data yet"))
            :slStudy.map(function(r,i){return h("tr",{key:i,style:{background:i%2===0?C.row:C.rowAlt}},
              h(Td,{s:{fontWeight:700}},r.l),h(Td,null,r.n),
              h(Td,{s:{color:r.avg>=0?C.green:C.red,fontWeight:700}},r.avg),
              h(Td,{s:{color:C.green}},r.max),h(Td,{s:{color:C.red}},r.min));})
          )
        )
      ),
      h("div",{style:{background:C.card,borderRadius:10,border:"1px solid "+C.border,padding:14,flex:1,minWidth:260}},
        h("div",{style:{color:C.blue,fontSize:11,fontWeight:700,marginBottom:10}},"Trade Management R Comparison"),
        h("table",{style:{width:"100%",borderCollapse:"collapse"}},
          h("thead",null,h("tr",null,h(Th,null,"TM"),h(Th,null,"n"),h(Th,null,"Avg R"),h(Th,null,"Max R"))),
          h("tbody",null,

              h(Td,{s:{fontWeight:700}},r.l),h(Td,null,r.n),
              h(Td,{s:{color:r.avg>=0?C.green:C.red,fontWeight:700}},r.avg),h(Td,{s:{color:C.green}},r.max));})
          )

      h("div",{style:{color:C.orange,fontSize:11,fontWeight:700,marginBottom:12}},"🔀 Multi-Filter Comparison"),

        h(FF,{label:"Filter 1 — Field"},
          h("select",{value:field1,onChange:function(ev){setField1(ev.target.value);setVal1("");},style:{width:"100%"}},
            filterableFields.map(function(f){return h("option",{key:f.key,value:f.key},f.label);})
          )

        h(FF,{label:"Filter 1 — Value"},
          h(Sel,{value:val1,onChange:setVal1,opts:getFieldList(field1),ph:"Any"})

            )),
            h("tbody",null,
              [
                val1?{label:(field1+"="+val1),data:aggG(f1Trades)}:null,

// ─── FILTER BAR ───────────────────────────────────────────────
function FilterBar(props){
  return h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",
    padding:"7px 16px",background:C.card,borderBottom:"1px solid "+C.border}},
    h("span",{style:{color:C.dim,fontSize:9,textTransform:"uppercase",letterSpacing:"0.05em"}},"Filter:"),
    h("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
      h("button",{onClick:function(){props.setAccFilter("all");},
        style:{background:props.accFilter==="all"?C.blue+"22":"none",color:props.accFilter==="all"?C.blue:C.dim,
          border:"1px solid "+(props.accFilter==="all"?C.blue:C.border),borderRadius:5,padding:"3px 10px",fontSize:10,fontWeight:600}},
        "All Accounts"),
      props.accounts.map(function(a){
        var active=props.accFilter===a.id;
        return h("button",{key:a.id,onClick:function(){props.setAccFilter(a.id);},
          style:{background:active?a.color+"22":"none",color:active?a.color:C.dim,
            border:"1px solid "+(active?a.color:C.border),borderRadius:5,padding:"3px 10px",fontSize:10,fontWeight:600}},
          a.name);
      })
    ),
    h("div",{style:{width:1,height:16,background:C.border}}),
    h("div",{style:{display:"flex",gap:4}},
      [["all","All Markets"],["forex","📈 Forex"],["futures","📊 Futures"]].map(function(item){
        var active=props.mktFilter===item[0];
        var mc=item[0]==="futures"?C.orange:item[0]==="forex"?C.blue:C.dim;
        return h("button",{key:item[0],onClick:function(){props.setMktFilter(item[0]);},
          style:{background:active?mc+"22":"none",color:active?mc:C.dim,
            border:"1px solid "+(active?mc:C.border),borderRadius:5,padding:"3px 10px",fontSize:10,fontWeight:600}},
          item[1]);
      })
    )
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────
function App(){
  var rs=useState([]); var raw=rs[0],setRaw=rs[1];
  var as=useState(DEFAULT_ACCOUNTS); var accounts=as[0],setAccounts=as[1];
  var ts=useState("dashboard"); var tab=ts[0],setTab=ts[1];
  var fs=useState(false); var showForm=fs[0],setShowForm=fs[1];
  var et=useState(null); var editT=et[0],setEditT=et[1];
  var am=useState(false); var showAccMgr=am[0],setShowAccMgr=am[1];
  var sm=useState(false); var showSettings=sm[0],setShowSettings=sm[1];
  var im=useState(false); var showImport=im[0],setShowImport=im[1];
  var af=useState("all"); var accFilter=af[0],setAccFilter=af[1];
  var mf=useState("all"); var mktFilter=mf[0],setMktFilter=mf[1];
  var ls=useState(DEFAULT_LISTS); var customLists=ls[0],setCustomLists=ls[1];

  // Load from storage
  useEffect(function(){
    var r=LS.get("fxj_v4_trades"); if(r&&Array.isArray(r))setRaw(r);
    var a=LS.get("fxj_v4_accounts"); if(a&&Array.isArray(a)&&a.length)setAccounts(a);
    var l=LS.get("fxj_v4_lists"); if(l&&typeof l==="object"){
      var merged={};Object.keys(DEFAULT_LISTS).forEach(function(k){merged[k]=l[k]||DEFAULT_LISTS[k];});
      setCustomLists(merged);
    }
  },[]);

  useEffect(function(){LS.set("fxj_v4_trades",raw);},[raw]);
  useEffect(function(){LS.set("fxj_v4_accounts",accounts);},[accounts]);
  useEffect(function(){LS.set("fxj_v4_lists",customLists);},[customLists]);

  var allTrades=useMemo(function(){return enrich(raw,accounts);},[raw,accounts]);

  var trades=useMemo(function(){
    return allTrades.filter(function(t){
      var passAcc=accFilter==="all"||t.accountId===accFilter;
      var passMkt=mktFilter==="all"||(mktFilter==="futures"&&t._isFutures)||(mktFilter==="forex"&&!t._isFutures);
      return passAcc&&passMkt;
    });
  },[allTrades,accFilter,mktFilter]);

  function saveTrade(t){
    if(editT)setRaw(function(p){return p.map(function(x){return x._tid===editT._tid?Object.assign({},t,{_tid:editT._tid}):x;});});
    else setRaw(function(p){return p.concat([Object.assign({},t,{_tid:Date.now()})]);});
    setShowForm(false);setEditT(null);
  }
  function delTrade(id){if(window.confirm("Delete this trade?"))setRaw(function(p){return p.filter(function(t){return t._tid!==id;});});}
  function delAllTrades(){setRaw([]);}
  function openEdit(t){setEditT(t);setShowForm(true);}
  function openAdd(){setEditT(null);setShowForm(true);}
  function addAccount(a){setAccounts(function(p){return p.concat([a]);});}
  function editAccount(a){setAccounts(function(p){return p.map(function(x){return x.id===a.id?a:x;});});}
  function delAccount(id){
    setAccounts(function(p){return p.filter(function(a){return a.id!==id;});});
    if(accFilter===id)setAccFilter("all");
  }
  function updateList(key,items){
    setCustomLists(function(p){var n={};Object.keys(p).forEach(function(k){n[k]=p[k];});n[key]=items;return n;});
  }
  function resetList(key){
    setCustomLists(function(p){var n={};Object.keys(p).forEach(function(k){n[k]=p[k];});n[key]=DEFAULT_LISTS[key]||[];return n;});
  }
  function importTrades(newTrades){setRaw(function(p){return p.concat(newTrades);});setShowImport(false);}

  var TABS=[
    {id:"dashboard",l:"📊 Dashboard"},{id:"raw",l:"📋 Raw"},
    {id:"daily",l:"📅 Daily"},{id:"weekly",l:"📆 Weekly"},
    {id:"monthly",l:"🗓 Monthly"},{id:"strategy",l:"🧠 Strategy"},
  ];

  return h("div",{style:{background:C.bg,minHeight:"100vh",color:C.text}},
    // Header
    h("div",{style:{background:C.card,borderBottom:"1px solid "+C.border,padding:"9px 16px",
      display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10}},
        h("div",{style:{width:34,height:34,borderRadius:8,
          background:"linear-gradient(135deg,#1E3A6E,#0D2344)",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}},"📈"),
        h("div",null,
          h("div",{style:{fontWeight:800,fontSize:14,color:C.white}},"Trading Journal"),
          h("div",{style:{fontSize:9,color:C.dim}},raw.length+" trades · "+accounts.length+" account"+(accounts.length!==1?"s":""))
        )
      ),
      h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
        h("button",{onClick:openAdd,
          style:{background:C.blue,color:"#fff",border:"none",borderRadius:7,padding:"6px 13px",fontSize:11,fontWeight:700}},
          "+ New Trade"),
        h("button",{onClick:function(){setShowImport(true);},
          style:{background:C.row,border:"1px solid "+C.border,color:C.text,borderRadius:7,padding:"6px 10px",fontSize:11}},
          "📂"),
        h("button",{onClick:function(){setShowAccMgr(true);},
          style:{background:C.row,border:"1px solid "+C.border,color:C.text,borderRadius:7,padding:"6px 10px",fontSize:11}},
          "💼"),
        h("button",{onClick:function(){setShowSettings(true);},
          style:{background:C.row,border:"1px solid "+C.border,color:C.text,borderRadius:7,padding:"6px 10px",fontSize:11}},
          "⚙")
      )
    ),
    // Filter bar
    h(FilterBar,{accounts:accounts,accFilter:accFilter,setAccFilter:setAccFilter,
      mktFilter:mktFilter,setMktFilter:setMktFilter}),
    // Tabs
    h("div",{style:{background:C.card,borderBottom:"1px solid "+C.border,padding:"0 16px",display:"flex",gap:2,overflowX:"auto"}},
      TABS.map(function(t){var active=tab===t.id;
        return h("button",{key:t.id,className:"tab-btn"+(active?" active":""),onClick:function(){setTab(t.id);}},t.l);
      })
    ),
    // Content
    h("div",{style:{padding:14}},
      tab==="dashboard"&&h(DashboardTab,{trades:trades,accounts:accounts,accFilter:accFilter}),
      tab==="raw"&&h(RawTab,{trades:trades,accounts:accounts,onEdit:openEdit,onDelete:delTrade,onDeleteAll:delAllTrades,onAdd:openAdd}),
      tab==="daily"&&h(DailyTab,{trades:trades}),
      tab==="weekly"&&h(WeeklyTab,{trades:trades}),
      tab==="monthly"&&h(MonthlyTab,{trades:trades}),
      tab==="strategy"&&h(StrategyTab,{trades:trades,lists:customLists})
    ),
    showForm&&h(TradeForm,{trade:editT,accounts:accounts,lists:customLists,
      defaultAccId:accFilter!=="all"?accFilter:(accounts[0]||{id:"acc_1"}).id,
      onSave:saveTrade,onClose:function(){setShowForm(false);setEditT(null);}}),
    showAccMgr&&h(AccManager,{accounts:accounts,onAdd:addAccount,onEdit:editAccount,
      onDelete:delAccount,onClose:function(){setShowAccMgr(false);}}),
    showSettings&&h(SettingsManager,{lists:customLists,onChange:updateList,
      onReset:resetList,onClose:function(){setShowSettings(false);}}),
    showImport&&h(ImportExport,{trades:allTrades,accounts:accounts,
      onImport:importTrades,onClose:function(){setShowImport(false);}})
  );
}

RD.render(R.createElement(App),document.getElementById("root"));
} // end initApp
</script>
</body>
</html>
